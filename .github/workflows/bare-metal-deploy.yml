name: Bare Metal Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Push app to bare metal
    runs-on: ubuntu-latest
    concurrency: news-app-bare-metal-deploy
    environment: production
    env:
      DEPLOY_REMOTE_DIR: ${{ vars.DEPLOY_REMOTE_DIR }}
      DEPLOY_OWNER_GROUP: ${{ vars.DEPLOY_OWNER_GROUP }}
      DEPLOY_PROGRAMS: ${{ vars.DEPLOY_PROGRAMS }}
      DEPLOY_REQUIRED_RUNNING_PROGRAMS: ${{ vars.DEPLOY_REQUIRED_RUNNING_PROGRAMS }}
      DEPLOY_PYTHON_VERSION: ${{ vars.DEPLOY_PYTHON_VERSION }}
      DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust remote host key
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_SSH_HOST:-}" ]]; then
            echo "DEPLOY_SSH_HOST secret is not set" >&2
            exit 1
          fi
          PORT="${DEPLOY_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Rsync build to server and restart services
        env:
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail

          if [[ -z "${DEPLOY_SSH_USER:-}" || -z "${DEPLOY_SSH_HOST:-}" ]]; then
            echo "DEPLOY_SSH_USER and DEPLOY_SSH_HOST secrets are required" >&2
            exit 1
          fi

          REMOTE="${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}"
          PORT="${DEPLOY_SSH_PORT:-22}"
          SSH_OPTS=(-p "$PORT" -o StrictHostKeyChecking=yes -o BatchMode=yes)
          REMOTE_DIR="${DEPLOY_REMOTE_DIR:-/opt/news_app}"
          OWNER_GROUP="${DEPLOY_OWNER_GROUP:-newsapp:newsapp}"
          PROGRAMS="${DEPLOY_PROGRAMS:-news_app_server news_app_workers_content news_app_workers_image news_app_workers_media news_app_workers_onboarding news_app_workers_twitter news_app_workers_chat news_app_queue_watchdog news_app_bgutil_provider}"
          REQUIRED_RUNNING_PROGRAMS="${DEPLOY_REQUIRED_RUNNING_PROGRAMS:-news_app_server news_app_workers_content news_app_workers_image news_app_workers_media news_app_queue_watchdog}"
          LEGACY_PROGRAMS="news_app_workers_transcribe"

          echo "→ Verifying SSH connectivity"
          ssh "${SSH_OPTS[@]}" "$REMOTE" "echo 'SSH ok: $(whoami)@$(hostname) on port $PORT'"

          echo "→ Ensuring remote path and ownership"
          ssh "${SSH_OPTS[@]}" "$REMOTE" "sudo mkdir -p '$REMOTE_DIR' && sudo chown '$OWNER_GROUP' '$REMOTE_DIR' && sudo chmod 755 '$REMOTE_DIR'"

          echo "→ Syncing repo (excluding .venv) to $REMOTE:$REMOTE_DIR"
          EXCLUDES=(
            ".git/"
            ".github/"
            ".worktrees/"
            ".venv/"
            "ai-memory/"
            "archive/"
            "client/"
            "data/"
            "env/"
            "logs/"
            "node_modules/"
            "__pycache__/"
            ".ruff_cache/"
            ".pytest_cache/"
            ".benchmarks/"
            "*.pyc"
            "*.pyo"
            "*.db"
            "*.sqlite"
            ".DS_Store"
            ".env"
            ".env.*"
          )
          PROTECTED_PATHS=(
            ".venv/"
            ".env"
            ".env.racknerd"
            "archive/"
            "data/"
            "logs/"
            "secrets/"
          )

          RSYNC_ARGS=(-az --delete --rsync-path="sudo rsync" --info=progress2 --chown="$OWNER_GROUP" -e "ssh -p $PORT -o StrictHostKeyChecking=yes -o BatchMode=yes")
          for ex in "${EXCLUDES[@]}"; do
            RSYNC_ARGS+=(--exclude "$ex")
          done
          for protected_path in "${PROTECTED_PATHS[@]}"; do
            RSYNC_ARGS+=(--filter "P $protected_path")
          done

          rsync "${RSYNC_ARGS[@]}" ./ "$REMOTE:$REMOTE_DIR/"

          echo "→ Refreshing env file if present"
          ssh "${SSH_OPTS[@]}" "$REMOTE" "cd '$REMOTE_DIR' && if [[ -f .env.racknerd ]]; then sudo cp .env.racknerd .env && sudo chown '$OWNER_GROUP' .env && sudo chmod 600 .env; else echo 'Warning: .env.racknerd missing; skipping copy' >&2; fi"

          SERVICE_USER="${OWNER_GROUP%%:*}"
          PY_VERSION="${DEPLOY_PYTHON_VERSION:-3.13}"
          echo "→ Installing supervisor config from repo sample"
          ssh "${SSH_OPTS[@]}" "$REMOTE" "bash -lc '
            set -euo pipefail
            SOURCE_CONF=\"$REMOTE_DIR/supervisor.conf\"
            TARGET_CONF=\"/etc/supervisor/conf.d/news_app.conf\"
            if [[ ! -f \"\$SOURCE_CONF\" ]]; then
              echo \"Missing \$SOURCE_CONF\" >&2
              exit 1
            fi
            sudo cp \"\$SOURCE_CONF\" \"\$TARGET_CONF\"
            sudo chown root:root \"\$TARGET_CONF\"
            sudo chmod 644 \"\$TARGET_CONF\"
          '"

          echo "→ Resolving supervisor programs to stop"
          STOP_STATUS_OUTPUT=$(ssh "${SSH_OPTS[@]}" "$REMOTE" "sudo supervisorctl status")
          STOP_PROGRAMS=$(printf '%s\n' "$STOP_STATUS_OUTPUT" | python3 ./scripts/verify_supervisor_programs.py resolve --configured $PROGRAMS $LEGACY_PROGRAMS)
          if [[ -n "${STOP_PROGRAMS:-}" ]]; then
            echo "→ Supervisor programs to stop: $STOP_PROGRAMS"
            echo "→ Stopping supervisor programs"
            ssh "${SSH_OPTS[@]}" "$REMOTE" "sudo supervisorctl stop $STOP_PROGRAMS || true"
          else
            echo "→ No matching supervisor programs were running before deploy"
          fi

          echo "→ Setting up Python environment on remote (uv venv, deps, playwright)"
          ssh "${SSH_OPTS[@]}" "$REMOTE" "sudo -u $SERVICE_USER -H bash -lc 'cd $REMOTE_DIR && ./scripts/setup_uv_env.sh --python-version $PY_VERSION --recreate'"

          echo "→ Running Alembic migrations"
          ssh "${SSH_OPTS[@]}" "$REMOTE" "sudo -u $SERVICE_USER -H bash -lc 'cd $REMOTE_DIR && ./scripts/check_and_run_migrations.sh'"

          echo "→ Syncing cron from repo crontab"
          ssh "${SSH_OPTS[@]}" "$REMOTE" "bash -lc '
            set -euo pipefail
            CRON_FILE=\"$REMOTE_DIR/crontab\"
            if [[ ! -f \"\$CRON_FILE\" ]]; then
              echo \"Missing \$CRON_FILE\" >&2
              exit 1
            fi
            sudo -u $SERVICE_USER -H bash -lc \"crontab \\\"\$CRON_FILE\\\" && crontab -l\"
          '"

          echo "→ Restarting supervisor programs"
          START_STATUS_OUTPUT=$(ssh "${SSH_OPTS[@]}" "$REMOTE" "bash -lc '
            set -euo pipefail
            sudo supervisorctl reread >/dev/null
            sudo supervisorctl update >/dev/null
            sudo supervisorctl status
          '")
          START_PROGRAMS=$(printf '%s\n' "$START_STATUS_OUTPUT" | python3 ./scripts/verify_supervisor_programs.py resolve --configured $PROGRAMS)
          if [[ -z "${START_PROGRAMS:-}" ]]; then
            echo "No configured supervisor programs available to start after update: $PROGRAMS" >&2
            exit 1
          fi
          REQUIRED_START_PROGRAMS=$(printf '%s\n' "$START_STATUS_OUTPUT" | python3 ./scripts/verify_supervisor_programs.py resolve --configured $REQUIRED_RUNNING_PROGRAMS)
          echo "→ Required programs expected to be RUNNING: ${REQUIRED_START_PROGRAMS:-<none>}"
          ssh "${SSH_OPTS[@]}" "$REMOTE" "sudo supervisorctl start $START_PROGRAMS || true"

          echo "→ Verifying required supervisor programs are RUNNING"
          if [[ -z "${REQUIRED_START_PROGRAMS:-}" ]]; then
            echo "→ No matching required supervisor programs found; printing status only"
            printf '%s\n' "$START_STATUS_OUTPUT"
          else
            for attempt in 1 2 3 4 5 6; do
              STATUS_OUTPUT=$(ssh "${SSH_OPTS[@]}" "$REMOTE" "sudo supervisorctl status")
              MISSING_PROGRAMS=$(printf '%s\n' "$STATUS_OUTPUT" | python3 ./scripts/verify_supervisor_programs.py missing --required $REQUIRED_START_PROGRAMS)

              if [[ -z "${MISSING_PROGRAMS// }" ]]; then
                echo "All required supervisor programs are RUNNING"
                printf '%s\n' "$STATUS_OUTPUT"
                break
              fi

              if [[ $attempt -eq 6 ]]; then
                echo "Required supervisor programs failed to reach RUNNING: $MISSING_PROGRAMS" >&2
                printf '%s\n' "$STATUS_OUTPUT"
                exit 1
              fi

              echo "Waiting for required programs to reach RUNNING (attempt $attempt/6): $MISSING_PROGRAMS"
              sleep 5
            done
          fi
