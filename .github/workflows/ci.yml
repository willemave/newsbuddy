name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Run Ruff
        run: uv run ruff check app scripts

  go-cli:
    name: Go CLI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Verify generated CLI artifacts
        run: ./scripts/generate_agent_cli_artifacts.sh

      - name: Check generated artifacts are committed
        run: git diff --exit-code -- cli/openapi/agent-openapi.json cli/internal/api

      - name: Run Go tests
        working-directory: cli
        run: go test ./...

  test:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Run pytest
        run: uv run pytest tests/ -q

  guardrails:
    name: Module Guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Check module size guardrails
        run: python scripts/check_module_size_guardrails.py
