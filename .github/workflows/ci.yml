name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql+psycopg://newsly:newsly@127.0.0.1:5432/newsly
  JWT_SECRET_KEY: ci-jwt-secret-key
  ADMIN_PASSWORD: ci-admin-password
  GOOGLE_API_KEY: ci-google-api-key
  LANGFUSE_ENABLED: "false"

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Run Ruff
        run: uv run ruff check app scripts

  go-cli:
    name: Go CLI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Run Go tests
        working-directory: cli
        run: go test ./...

  test:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: newsly
          POSTGRES_PASSWORD: newsly
          POSTGRES_DB: newsly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U newsly -d newsly"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Run migrations
        run: uv run alembic -c migrations/alembic.ini upgrade head

      - name: Run pytest
        run: uv run pytest tests/ -q

  ios:
    name: iOS Tests
    runs-on: macos-15
    timeout-minutes: 60

    defaults:
      run:
        working-directory: client/newsly

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3.0"

      - name: Run iOS tests
        run: |
          xcodebuild test \
            -project newsly.xcodeproj \
            -scheme newsly \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
