[program:news_app_queue_watchdog]
command=/opt/news_app/scripts/start_queue_watchdog.sh
directory=/opt/news_app
user=newsapp
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stopsignal=TERM
stdout_logfile=/var/log/news_app/watchdog.log
stderr_logfile=/var/log/news_app/watchdog.err.log
redirect_stderr=false
environment=PATH="/opt/news_app/.venv/bin:/usr/local/bin:/usr/bin:/bin",QUEUE_WATCHDOG_MEDIA_STALE_HOURS="2",QUEUE_WATCHDOG_PROCESS_CONTENT_STALE_HOURS="2",QUEUE_WATCHDOG_ALERT_THRESHOLD="1"

[program:news_app_bgutil_provider]
command=/bin/bash -c "/opt/news_app/scripts/start_bgutil_provider.sh"
directory=/opt/news_app
user=root
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stopsignal=TERM
stdout_logfile=/var/log/news_app/bgutil_provider.log
stderr_logfile=/var/log/news_app/bgutil_provider.err.log
redirect_stderr=false
environment=BGUTIL_PROVIDER_IMAGE="brainicism/bgutil-ytdlp-pot-provider:1.3.1",BGUTIL_PROVIDER_HOST="127.0.0.1",BGUTIL_PROVIDER_PORT="4416",BGUTIL_PROVIDER_PULL_IMAGE="missing"

# Scrapers/discovery scheduling is managed by cron, not Supervisor.
# Keep only API + workers here.
#
# Recommended `newsapp` crontab entries:
# */15 * * * * flock -n /tmp/news_app_scrapers.lock /bin/bash -lc 'cd /opt/news_app && /opt/news_app/.venv/bin/python scripts/run_scrapers.py --show-stats --scrapers HackerNews Reddit Substack Techmeme Podcast Atom' >> /var/log/news_app/scrapers-cron.log 2>&1
# */15 * * * * flock -n /tmp/news_app_twitter.lock /bin/bash -lc 'cd /opt/news_app && /opt/news_app/.venv/bin/python scripts/run_twitter.py' >> /var/log/news_app/twitter.log 2>&1
# 0 3 * * 1 flock -n /tmp/news_app_feed_discovery.lock /bin/bash -lc 'cd /opt/news_app && /opt/news_app/.venv/bin/python scripts/run_feed_discovery.py' >> /var/log/news_app/feed-discovery-cron.log 2>&1
