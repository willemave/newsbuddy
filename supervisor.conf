# News App Supervisor Configuration
# Copy to: /etc/supervisor/conf.d/news_app.conf
# Then run: supervisorctl reread && supervisorctl update

[program:news_app_server]
command=/bin/bash -lc "/opt/news_app/scripts/start_server.sh"
directory=/opt/news_app
user=newsapp
autostart=true
autorestart=true
stopsignal=TERM
startretries=3
stdout_logfile=/var/log/news_app/server.log
stderr_logfile=/var/log/news_app/server.err.log
redirect_stderr=false
environment=ENVIRONMENT="production"

[program:news_app_workers_content]
command=/bin/bash -lc "/opt/news_app/.venv/bin/python /opt/news_app/scripts/run_workers.py --queue content --worker-slot %(process_num)s --stats-interval 60"
directory=/opt/news_app
user=newsapp
autostart=true
autorestart=true
numprocs=1
numprocs_start=1
process_name=%(program_name)s_%(process_num)s
stopwaitsecs=900
stopasgroup=true
killasgroup=true
stopsignal=TERM
stdout_logfile=/var/log/news_app/workers.log
stderr_logfile=/var/log/news_app/workers.err.log
redirect_stderr=false
environment=ENVIRONMENT="production"

[program:news_app_workers_image]
command=/bin/bash -lc "/opt/news_app/.venv/bin/python /opt/news_app/scripts/run_workers.py --queue image --worker-slot 1 --stats-interval 60"
directory=/opt/news_app
user=newsapp
autostart=true
autorestart=true
stopwaitsecs=900
stopasgroup=true
killasgroup=true
stopsignal=TERM
stdout_logfile=/var/log/news_app/workers_image.log
stderr_logfile=/var/log/news_app/workers_image.err.log
redirect_stderr=false
environment=ENVIRONMENT="production"

